<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body>

<div class="feed">

  <div class="post">

    <!-- HEADER -->
    <div class="post-header">
      <div class="header-left">
        <i class="fa-brands fa-html5 html-icon"></i>
        <div class="user-info">
          <strong>HTML5</strong>
          <span>Rigoberto</span>
        </div>
      </div>

      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <!-- IMAGE -->
    <img src="https://st.depositphotos.com/1679308/1622/i/950/depositphotos_16225575-stock-photo-landscape-of-croatian-nature.jpg" alt="post image">

    <!-- ICONS -->
    <div class="post-icons">
      <div class="icons-left">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-comment"></i>
        <i class="fa-regular fa-paper-plane"></i>
      </div>
      <i class="fa-regular fa-bookmark"></i>
    </div>

    <!-- LIKES -->
    <div class="likes">
      Liked by <strong>4GeeksAcademy, html5, Web</strong> and <strong>100,000 others</strong>
    </div>

    <!-- DESCRIPTION -->
    <div class="description">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat.
    </div>

  </div>

</div>

</body>
</html>
